    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.28);
    }
    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 48px 40px 52px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(4px) saturate(1.1);
      -webkit-backdrop-filter: blur(4px) saturate(1.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 28px;
      box-shadow: 0 8px 60px rgba(0,0,0,0.13);
      max-width: 520px;
      width: 90vw;
    }
    .emoji-top {
      font-size: 2.4rem;
      margin-bottom: 12px;
      animation: wiggle 1.4s ease-in-out infinite;
      display: block;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-6deg); }
      50% { transform: rotate(6deg); }
    }
    h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 8vw, 3.6rem);
      letter-spacing: 0.04em;
      color: #1a1a1a;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    h1 span.accent { color: #e63946; }
    .subtitle {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 36px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .countdown {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .unit .num {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(3rem, 12vw, 5rem);
      line-height: 1;
      color: #1a1a1a;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(200,200,200,0.5);
      border-radius: 14px;
      padding: 8px 18px;
      min-width: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .unit .num.tick {
      transform: scale(1.08);
      color: #e63946;
    }
    .unit .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #777;
      font-weight: 700;
    }
    .sep {
      font-family: 'Bebas Neue', cursive;
      font-size: 3.5rem;
      color: #ccc;
      line-height: 1;
      align-self: center;
      margin-top: -16px;
    }
    
    
    
    
      50% { opacity: 0; }
    }
    
    #done-msg {
      display: none;
      font-family: 'Bebas Neue', cursive;
      font-size: 2.8rem;
      color: #e63946;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.06); }
    }
  </style>
</head>

<div class="bg"></div>
<div class="card">
  <span class="emoji-top">🔥</span>
  <h1>Kat baise enfin <span class="accent">dans</span></h1>
  <p class="subtitle">Compte à rebours officiel &amp; certifié</p>
  <div class="countdown" id="countdown">
    <div class="unit">
      <div class="num" id="days">--</div>
      <div class="label">Jours</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="hours">--</div>
      <div class="label">Heures</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="minutes">--</div>
      <div class="label">Minutes</div>
    </div>
    <div class="sep">:</div>
    <div class="unit">
      <div class="num" id="seconds">--</div>
      <div class="label">Secondes</div>
    </div>
  </div>
  <div id="done-msg">🎉 C'EST L'HEURE KAT !!! 🎉</div>
  
  
</div>
<script>
  var target = new Date('2026-06-22T23:00:00');
  function pad(n) { return String(n).padStart(2,'0'); }
  function tick() {
    var now = new Date();
    var diff = target - now;
    if (diff <= 0) {
      document.getElementById('countdown').style.display = 'none';
      document.getElementById('done-msg').style.display = 'block';
      if (window._timer) clearInterval(window._timer);
      return;
    }
    var totalSeconds = Math.floor(diff / 1000);
    var days    = Math.floor(totalSeconds / 86400);
    var hours   = Math.floor((totalSeconds % 86400) / 3600);
    var minutes = Math.floor((totalSeconds % 3600) / 60);
    var seconds = totalSeconds % 60;
    function setVal(id, val) {
      var el = document.getElementById(id);
      if (!el) return;
      var newVal = pad(val);
      if (el.textContent !== newVal) {
        el.classList.add('tick');
        setTimeout(function(){ el.classList.remove('tick'); }, 150);
      }
      el.textContent = newVal;
    }
    setVal('days', days);
    setVal('hours', hours);
    setVal('minutes', minutes);
    setVal('seconds', seconds);
  }
  tick();
  window._timer = setInterval(tick, 1000);
</script>
</body>
</html>
